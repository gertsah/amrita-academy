<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMRITA — showcase</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" />
  <style>
    :root{ --gold:#C9A24B; --gold-br:#EDC76C; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; overflow:hidden; background:#000; }
    body{ font-family:"Jost",system-ui,sans-serif; color:#fff; }

    .stage{
      position:fixed; inset:0; perspective:1700px; overflow:hidden;
      background:radial-gradient(120% 90% at 50% 30%, #1b1b1d 0%, #0c0c0d 45%, #050505 100%);
    }
    .stage::before{
      content:""; position:absolute; left:50%; top:46%; width:70vw; height:70vw;
      transform:translate(-50%,-50%); border-radius:50%;
      background:radial-gradient(circle, rgba(201,162,75,.12), transparent 60%);
      filter:blur(30px); pointer-events:none;
    }

    .mark{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:6; text-align:center; }
    .mark svg{ width:clamp(120px,14vw,190px); height:auto; overflow:visible; }
    .mark__word{ margin-top:1.1rem; font-family:"Cormorant Garamond",serif; font-weight:600; letter-spacing:.5em; text-indent:.5em; font-size:1.5rem; color:var(--gold-br); }
    .mark__tag{ margin-top:.5rem; font-size:.66rem; letter-spacing:.42em; text-transform:uppercase; color:rgba(255,255,255,.55); }
    .mark__cta{ display:inline-block; margin-top:1.6rem; font-size:.62rem; letter-spacing:.26em; text-transform:uppercase; color:#0c0c0d; background:var(--gold-br); border-radius:99px; padding:.9em 2.2em; }
    #outro{ opacity:0; visibility:hidden; }

    .scratch{ position:absolute; left:50%; top:calc(50% + 130px); width:min(46vw,520px); height:1px; transform:translateX(-50%) scaleX(0); transform-origin:left center; background:linear-gradient(90deg, transparent, var(--gold), transparent); z-index:6; }

    .device{
      position:absolute; left:50%; top:50%; width:1180px; height:720px;
      background:#0e0e0e; border-radius:16px; overflow:hidden; z-index:4;
      box-shadow:0 70px 130px -40px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.07);
      opacity:0; visibility:hidden;
    }
    .device__bar{ height:40px; display:flex; align-items:center; gap:8px; padding:0 16px; background:#161616; }
    .dot{ width:11px; height:11px; border-radius:50%; background:#363636; }
    .dot:nth-child(1){ background:#e06b5e; } .dot:nth-child(2){ background:#e3b14a; } .dot:nth-child(3){ background:#62b463; }
    .device__url{ margin:0 auto; font-size:12px; color:#9a9a9a; background:#0e0e0e; padding:6px 18px; border-radius:99px; letter-spacing:.04em; }
    .device__screen{ position:relative; width:100%; height:calc(100% - 40px); background:#E4E7C8; }
    .device__screen iframe{ width:100%; height:100%; border:0; display:block; }

    .cursor{ position:absolute; left:50%; top:60%; width:24px; height:24px; z-index:5; pointer-events:none; opacity:0; will-change:transform; }
    .cursor svg{ width:100%; height:100%; filter:drop-shadow(0 2px 3px rgba(0,0,0,.4)); }
    .ripple{ position:absolute; width:14px; height:14px; border-radius:50%; border:2px solid var(--gold-br); transform:translate(-50%,-50%) scale(0); opacity:0; }

    .sweep{ position:absolute; inset:-20%; z-index:7; pointer-events:none;
      background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,.18) 50%, transparent 60%);
      transform:translateX(-120%); }

    .credit{ position:absolute; left:0; bottom:22px; width:100%; text-align:center; z-index:6; font-size:.6rem; letter-spacing:.34em; text-transform:uppercase; color:rgba(255,255,255,.32); opacity:0; }

    .replay{ position:fixed; right:18px; bottom:16px; z-index:20; font:inherit; font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; color:#0c0c0d; background:var(--gold-br); border:0; border-radius:99px; padding:.7em 1.4em; cursor:pointer; opacity:0; transition:opacity .4s; }
    .replay.show{ opacity:.9; }
    @media (prefers-reduced-motion: reduce){ .replay{ opacity:.9; } }
  </style>
</head>
<body>
  <div class="stage" id="stage">

    <div class="mark" id="intro">
      <svg viewBox="0 0 200 220" fill="none" stroke="var(--gold-br)" aria-hidden="true">
        <circle cx="100" cy="92" r="80" stroke-width="1.4"/>
        <circle cx="100" cy="92" r="70" stroke-width="0.8"/>
        <polygon points="100,34 156,140 44,140" stroke-width="1.3"/>
        <g stroke-width="0.9">
          <circle cx="100" cy="96" r="16"/><circle cx="100" cy="80" r="16"/>
          <circle cx="114" cy="88" r="16"/><circle cx="114" cy="104" r="16"/>
          <circle cx="100" cy="112" r="16"/><circle cx="86" cy="104" r="16"/><circle cx="86" cy="88" r="16"/>
        </g>
        <path d="M100 178 C94 170 82 170 82 178 C82 186 94 186 100 178 C106 170 118 170 118 178 C118 186 106 186 100 178Z" stroke-width="1.1"/>
      </svg>
      <div class="mark__word">AMRITA</div>
    </div>
    <span class="scratch" id="scratch"></span>

    <div class="device" id="device">
      <div class="device__bar">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <div class="device__url">amrita-academy.ru</div>
      </div>
      <div class="device__screen">
        <iframe id="frame" title="Академия Амрита" src="index.html?showcase=1"></iframe>
        <div class="cursor" id="cursor">
          <svg viewBox="0 0 24 24" fill="#fff" stroke="#222" stroke-width="1"><path d="M5 3 L19 12 L12 13 L9 20 Z"/></svg>
          <span class="ripple" id="ripple"></span>
        </div>
      </div>
    </div>

    <div class="mark" id="outro">
      <svg viewBox="0 0 200 180" fill="none" stroke="var(--gold-br)" aria-hidden="true">
        <circle cx="100" cy="80" r="70" stroke-width="1.3"/>
        <polygon points="100,30 150,124 50,124" stroke-width="1.2"/>
        <g stroke-width="0.9"><circle cx="100" cy="84" r="14"/><circle cx="100" cy="70" r="14"/><circle cx="112" cy="77" r="14"/><circle cx="112" cy="91" r="14"/><circle cx="100" cy="98" r="14"/><circle cx="88" cy="91" r="14"/><circle cx="88" cy="77" r="14"/></g>
      </svg>
      <div class="mark__word">AMRITA</div>
      <div class="mark__tag">Возвращение к себе</div>
      <a class="mark__cta" id="outroCta">Записаться</a>
    </div>

    <div class="sweep" id="sweep"></div>
    <p class="credit" id="credit">Академия «Амрита» · кундалини-йога</p>
  </div>

  <button class="replay" id="replay">↻ повтор</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
  (function () {
    "use strict";
    var device = document.getElementById("device");
    var frame  = document.getElementById("frame");
    var cursor = document.getElementById("cursor");
    var ripple = document.getElementById("ripple");

    function fit(w, h){ return Math.min((window.innerWidth*0.9)/w, (window.innerHeight*0.84)/h); }
    function scrollFrame(y){ try{ frame.contentWindow.scrollTo(0, y); }catch(e){} }

    gsap.set(device, { xPercent:-50, yPercent:-50, transformPerspective:1700, transformOrigin:"center center" });
    gsap.set("#intro",{ transformOrigin:"center center" });
    gsap.set("#outro",{ transformOrigin:"center center" });

    var built = false;
    function build(){
      if (built) return; built = true;
      var win = frame.contentWindow, doc = win.document;
      function vh(){ try{ return win.innerHeight; }catch(e){ return 720; } }
      function secY(sel, pad){ try{ var el=doc.querySelector(sel); if(!el) return 0; return Math.max(0, el.getBoundingClientRect().top + win.scrollY - (pad||0)); }catch(e){ return 0; } }
      function maxY(){ try{ return Math.max(0, doc.documentElement.scrollHeight - win.innerHeight); }catch(e){ return 4000; } }

      var dDesk = fit(1180,720), dTab = fit(900,660), dMob = fit(412,760);
      var sp = { y:0 };
      var drive = function(){ scrollFrame(sp.y); };

      var tl = gsap.timeline({ defaults:{ ease:"power2.inOut" } });

      /* ── СЦЕНА 1 · ИНТРО ── */
      tl.from("#intro svg", { scale:0.8, autoAlpha:0, duration:1.6, ease:"power2.out" })
        .fromTo("#intro svg", { filter:"drop-shadow(0 0 0px rgba(237,199,108,0))" },
          { filter:"drop-shadow(0 0 30px rgba(237,199,108,.55))", duration:1.4, yoyo:true, repeat:1, ease:"sine.inOut" }, "<0.2")
        .from(".mark__word", { autoAlpha:0, y:16, duration:1.2, ease:"power2.out" }, "<0.5")
        .to("#scratch", { scaleX:1, duration:1.4, ease:"power2.inOut" }, "<0.1")
        .to(["#intro","#scratch"], { autoAlpha:0, duration:1.0, ease:"power2.in" }, "+=0.8");

      /* ── СЦЕНА 2 · HERO REVEAL ── */
      gsap.set(device, { width:1180, height:720, scale:dDesk });
      tl.fromTo(device,
          { autoAlpha:0, y:220, rotationX:24, scale:dDesk*0.92 },
          { autoAlpha:1, y:0, rotationX:0, scale:dDesk, duration:1.7, ease:"power3.out" }, "-=0.1")
        .to(device, { scale:dDesk*1.04, duration:2.8, ease:"sine.inOut" });

      /* курсор → «Записаться» + ripple */
      tl.set(cursor, { autoAlpha:1, left:"46%", top:"58%" })
        .to(cursor, { left:"85%", top:"10%", duration:1.7, ease:"power2.inOut" })
        .to(ripple, { scale:2.6, autoAlpha:1, duration:0.55, ease:"power2.out" }, "-=0.15")
        .to(ripple, { autoAlpha:0, duration:0.5 }, ">")
        .to(cursor, { autoAlpha:0, duration:0.7 }, ">0.2");

      /* ── СЦЕНА 3 · МЕДЛЕННЫЙ ПРОХОД ПО ВСЕМУ САЙТУ (со стопами) ── */
      function step(sel, pad, hold){
        tl.to(sp, { y:function(){ return secY(sel,pad); }, duration:2.1, ease:"power2.inOut", onUpdate:drive })
          .to({}, { duration:hold });
      }
      step("#practice", 40, 2.8);   // три арки практик + подписи
      step(".say", 150, 1.8);       // тихая строка
      step("#teacher", 40, 3.0);    // Алёна: портрет-маска, имя, цитата
      // сквозь стики-секцию «Тишина внутри» — очень медленно, чтобы отыграл эффект
      tl.to(sp, { y:function(){ return secY("#hold",0); }, duration:1.6, ease:"power2.inOut", onUpdate:drive })
        .to(sp, { y:function(){ var el=doc.querySelector("#hold"); return el ? el.getBoundingClientRect().top+win.scrollY+el.offsetHeight - vh()*0.55 : maxY(); },
                  duration:4.5, ease:"none", onUpdate:drive });
      step("#retreat", 0, 2.8);     // полоса ретрита
      step("#booking", 0, 2.8);     // призыв «Начните путь к себе»

      /* ── СЦЕНА 4 · КРУПНЫЙ ПЛАН ── */
      tl.to(device, { scale:dDesk*1.3, duration:1.4, ease:"power2.inOut" })
        .to({}, { duration:1.0 })
        .to(device, { scale:dDesk, duration:1.2, ease:"power2.inOut" })
        .add(function(){ scrollFrame(0); });

      /* ── СЦЕНА 5 · МУЛЬТИ-ДЕВАЙС (реальный адаптив, с паузами) ── */
      tl.to(device, { width:900, height:660, scale:dTab, rotationY:-16, duration:1.5, ease:"power3.inOut" }, "+=0.3")
        .to(device, { rotationY:0, duration:0.9, ease:"power2.out" })
        .to({}, { duration:1.4 })
        .to(device, { width:412, height:760, scale:dMob, rotationY:18, duration:1.5, ease:"power3.inOut" })
        .to(device, { rotationY:0, duration:0.9, ease:"power2.out" })
        .to(sp, { y:function(){ return secY("#practice",20); }, duration:2.2, ease:"power2.inOut", onUpdate:drive })
        .to({}, { duration:1.6 })
        .add(function(){ scrollFrame(0); });

      /* ── СЦЕНА 6 · АУТРО ── */
      tl.to(device, { scale:dMob*0.5, autoAlpha:0, y:30, duration:1.2, ease:"power2.in" }, "+=0.3")
        .fromTo("#outro", { autoAlpha:0 }, { autoAlpha:1, duration:0.1 }, "<0.3")
        .from("#outro svg", { scale:0.8, autoAlpha:0, duration:1.2, ease:"power3.out" }, "<")
        .from(".mark__tag", { autoAlpha:0, y:12, duration:1.0 }, "<0.5")
        .from("#outroCta", { autoAlpha:0, y:12, duration:0.9 }, "<0.3")
        .to("#outroCta", { scale:1.06, duration:1.0, yoyo:true, repeat:2, ease:"sine.inOut", transformOrigin:"center" }, "<0.4")
        .fromTo("#sweep", { x:"-120%" }, { x:"120%", duration:1.7, ease:"power2.inOut" }, "<0.2")
        .to("#credit", { autoAlpha:1, duration:1.0 }, "<0.4")
        .to({}, { duration:1.8 })
        .add(function(){ document.getElementById("replay").classList.add("show"); });

      window.__scTl = tl;
      document.documentElement.setAttribute("data-sc-start", "1"); // сигнал для рендера
    }

    frame.addEventListener("load", function(){ setTimeout(build, 600); });
    setTimeout(function(){ if (!built) build(); }, 3000);

    document.getElementById("replay").addEventListener("click", function(){
      this.classList.remove("show"); scrollFrame(0);
      if (window.__scTl) window.__scTl.restart(true);
    });
  })();
  </script>
</body>
</html>
